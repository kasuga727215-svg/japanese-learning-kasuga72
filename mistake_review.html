<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>錯題複習</title>
  <style>
    :root { --bg-color:#0d0e15; --text-color:#e8e8e8; --primary:#00ffcc; --secondary:#ff00ff; --panel-bg:#1a1c29; --border-color:#2a2d40; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg-color); color:var(--text-color); font-family:Arial,"Microsoft JhengHei",sans-serif; }
    .shell { width:min(100% - 24px, 900px); margin:24px auto; }
    a { color:var(--primary); text-decoration:none; }
    .nav { display:flex; gap:10px; flex-wrap:wrap; margin:16px 0 24px; }
    .nav a { border:1px solid var(--border-color); padding:10px 12px; border-radius:6px; }
    .card { background:var(--panel-bg); border:1px solid var(--border-color); border-radius:8px; padding:16px; margin-bottom:16px; overflow-wrap:anywhere; word-wrap:break-word; }
    h1,h2,strong,label { color:var(--primary); }
    select,input,button { width:100%; min-height:44px; border-radius:6px; border:1px solid var(--border-color); background:#080910; color:#fff; padding:10px; }
    button { color:var(--primary); border-color:var(--primary); background:transparent; font-weight:700; cursor:pointer; }
    .danger { color:var(--secondary); border-color:var(--secondary); }
    .row { display:grid; gap:12px; }
    .stats { display:grid; grid-template-columns:1fr; gap:12px; }
    .stat-value { color:var(--primary); font-size:1.55rem; font-weight:800; }
    .stat-label { color:#aeb4c8; font-size:.92rem; }
    .muted { color:#aeb4c8; }
    .error { color:var(--secondary); }
    .ok { color:var(--primary); }
    .debug-card { background:#030406; color:#e8fff9; border:1px solid #232636; border-left:4px solid var(--primary); border-radius:8px; padding:14px; font-family:Consolas,"Courier New",monospace; overflow-wrap:anywhere; word-wrap:break-word; }
    .debug-card.error { border-left-color:var(--secondary); }
    .debug-card.warning { border-left-color:#ffb000; }
    .debug-label { color:var(--primary); font-weight:800; }
    .debug-card.error .debug-label { color:var(--secondary); }
    .debug-card.warning .debug-label { color:#ffb000; }
    details { background:rgba(255,255,255,.06); border-radius:6px; padding:10px; margin-top:10px; }
    summary { color:var(--primary); font-weight:700; cursor:pointer; }
    @media (min-width:720px){ .row.two, .stats { grid-template-columns:repeat(3,1fr); } }
  </style>
</head>
<body>
<main class="shell">
  <h1>錯題複習</h1>
  <nav class="nav">
    <a href="/">每日教材</a><a href="/verb-practice">動詞練習</a><a href="/grammar-analyzer">文法拆解</a><a href="/sns-practice">SNS語感</a><a href="/learning-report">學習報告</a>
  </nav>
  <section class="stats" id="statsCards">
    <div class="card"><div class="stat-label">今日應複習</div><div class="stat-value" id="dueCount">-</div></div>
    <div class="card"><div class="stat-label">已掌握</div><div class="stat-value" id="masteredCount">-</div></div>
    <div class="card"><div class="stat-label">最常錯類型</div><div class="stat-value" id="topCategory">-</div></div>
  </section>
  <section class="card">
    <div class="row two">
      <div>
        <label for="filterType">依題型篩選</label>
        <select id="filterType">
          <option value="all">全部題型</option>
          {% for key, label in form_labels.items() %}
          <option value="{{ key }}">{{ label }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label for="filterCategory">依錯誤類型篩選</label>
        <select id="filterCategory">
          <option value="all">全部錯誤類型</option>
        </select>
      </div>
    </div>
  </section>
  <section id="mistakeList"></section>
</main>

<script>
const list = document.getElementById("mistakeList");
function esc(value){ return String(value ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;"); }
function renderDebug(report){
  if (!report) return "";
  const list = items => (items || []).map(item => `<div> - ${esc(item)}</div>`).join("");
  return `<div class="debug-card ${esc(report.severity)}">
    <div><span class="debug-label">[ ${esc(report.error_code)} | ${esc(report.severity)} ]</span></div>
    <div><span class="debug-label">[ Diagnosis ]</span> ${esc(report.diagnosis)}</div>
    <div><span class="debug-label">[ Rule ]</span> ${esc(report.rule)}</div>
    <div><span class="debug-label">[ Expected ]</span> ${esc(report.expected)}</div>
    <div><span class="debug-label">[ Actual ]</span> ${esc(report.actual)}</div>
    <div><span class="debug-label">[ Quick Fix ]</span>${list(report.quick_fix)}</div>
    <div><span class="debug-label">[ Similar ]</span>${list(report.similar_examples)}</div>
    <div><span class="debug-label">[ Hint ]</span> ${esc(report.hint_zh_tw)}</div>
  </div>`;
}
async function api(url, options={}) {
  const res = await fetch(url, {headers: {"Content-Type":"application/json"}, ...options});
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || "請求失敗");
  return data;
}

async function loadMistakes(){
  list.innerHTML = "<div class='card muted'>讀取錯題中...</div>";
  try {
    const type = document.getElementById("filterType").value;
    const category = document.getElementById("filterCategory").value;
    const rows = await api(`/api/mistakes?question_type=${encodeURIComponent(type)}&error_category=${encodeURIComponent(category)}`);
    if (!rows.length) { list.innerHTML = "<div class='card muted'>今日沒有到期的待複習錯題。</div>"; return; }
    list.innerHTML = rows.map(row => `
      <article class="card" id="mistake-${row.id}">
        <h2>${esc(row.dictionary_form)}（${esc(row.reading)}）</h2>
        <p class="muted">${esc(row.meaning)}｜${esc(row.verb_group_label)}｜${esc(row.question_label)}｜${esc(row.error_category)}｜錯誤 ${row.mistake_count} 次</p>
        <p class="muted">下次複習：${esc(row.next_review_date || "今日")}｜目前間隔：${esc(row.review_interval)} 天｜複習次數：${esc(row.review_count)}</p>
        <p>歷史錯誤答案：<strong class="error">${esc(row.user_wrong_answer)}</strong></p>
        <p>正確答案：<strong>${esc(row.correct_answer)}</strong></p>
        <details><summary>重新作答</summary>
          <input id="retry-${row.id}" placeholder="請輸入答案">
          <div class="row two" style="margin-top:12px;">
            <button onclick="retryMistake(${row.id})">送出</button>
            <button class="danger" onclick="markMastered(${row.id})">標記為已掌握</button>
          </div>
          <button style="margin-top:12px;" onclick="loadDebugReport(${row.id})">查看錯誤解析</button>
          <button style="margin-top:12px;" onclick="generateSimilar(${row.id})">生成類似題</button>
          <div id="result-${row.id}" style="margin-top:10px;"></div>
          <div id="debug-${row.id}" style="margin-top:10px;"></div>
          <div id="similar-${row.id}" style="margin-top:10px;"></div>
        </details>
      </article>
    `).join("");
  } catch (error) {
    list.innerHTML = `<div class="card error">${esc(error.message)}</div>`;
  }
}

async function retryMistake(id){
  const input = document.getElementById(`retry-${id}`);
  const result = document.getElementById(`result-${id}`);
  const answer = input.value.trim();
  if (!answer) { result.innerHTML = "<p class='error'>請先輸入答案。</p>"; return; }
  result.innerHTML = "<p class='muted'>批改中...</p>";
  try {
    const errorCategory = document.getElementById("filterCategory").value === "all" ? "動詞變化錯" : document.getElementById("filterCategory").value;
    const data = await api(`/api/mistakes/${id}/retry`, {method:"POST", body:JSON.stringify({answer, error_category:errorCategory})});
    result.innerHTML = data.correct
      ? `<p class='ok'>答對了。下次複習排在 ${esc(data.next_review_date)}，間隔 ${esc(data.review_interval)} 天。</p>`
      : `<p class='error'>仍需練習，已排到明天複習。正確答案：${esc(data.correct_answer)}</p><p>${esc(data.rule)}</p>${renderDebug(data.debug_report)}`;
    await loadStats();
  } catch(error) { result.innerHTML = `<p class='error'>${esc(error.message)}</p>`; }
}

async function loadDebugReport(id){
  const box = document.getElementById(`debug-${id}`);
  box.innerHTML = "<p class='muted'>讀取錯誤解析中...</p>";
  try {
    const report = await api(`/api/mistakes/${id}/debug`);
    box.innerHTML = renderDebug(report);
  } catch(error) {
    box.innerHTML = `<p class='error'>${esc(error.message)}</p>`;
  }
}

async function markMastered(id){
  await api(`/api/mistakes/${id}/mastered`, {method:"POST"});
  document.getElementById(`mistake-${id}`).remove();
  await loadStats();
}

function cleanAnswer(value) {
  return String(value ?? "").trim().replace(/[（(][ぁ-ゖー\s　]+[）)]/g, "").replace(/[\s　\u200b\u200c\u200d\ufeff]+/g, "");
}

async function generateSimilar(id){
  const box = document.getElementById(`similar-${id}`);
  box.innerHTML = "<p class='muted'>生成類似題中...</p>";
  try {
    const data = await api("/api/mistakes/generate-similar", {method:"POST", body:JSON.stringify({mistake_id:id})});
    if (!data.items || !data.items.length) { box.innerHTML = `<p class='muted'>${esc(data.message || "此題暫無法自動生成類似題")}</p>`; return; }
    box.innerHTML = data.items.map((item, index) => `
      <div class="card" id="similar-${id}-${index}">
        <strong>${esc(item.prompt)}</strong>
        ${item.type === "sns" ? `<p class="muted">語氣：${esc(item.tone_category)}</p><p>參考翻譯：${esc(item.reference_translation)}</p><p>直翻陷阱：${esc(item.literal_translation_trap)}</p>` : ""}
        <input id="similar-input-${id}-${index}" placeholder="${item.type === "sns" ? "請輸入自然繁中翻譯" : "請輸入答案"}">
        <button style="margin-top:10px;" onclick='checkSimilar(${id}, ${index}, ${JSON.stringify(item).replaceAll("'", "&#039;")})'>送出判斷</button>
        <div id="similar-result-${id}-${index}" style="margin-top:8px;"></div>
      </div>
    `).join("");
  } catch(error) { box.innerHTML = `<p class='error'>${esc(error.message)}</p>`; }
}

async function checkSimilar(parentId, index, item){
  const input = document.getElementById(`similar-input-${parentId}-${index}`);
  const result = document.getElementById(`similar-result-${parentId}-${index}`);
  const answer = input.value.trim();
  if (!answer) { result.innerHTML = "<p class='error'>請先輸入答案。</p>"; return; }
  if (item.type === "verb") {
    const data = await api("/api/verb-practice/check", {method:"POST", body:JSON.stringify({verb_id:item.verb_id, question_type:item.question_type, answer})});
    result.innerHTML = data.correct ? "<p class='ok'>答對了。</p>" : `<p class='error'>答錯了，已加入錯題。正確答案：${esc(data.correct_answer)}</p>`;
    await loadStats();
    return;
  }
  result.innerHTML = `<p class='muted'>請自行對照參考翻譯。若覺得直翻不自然，可到 SNS 語感頁加強練習。</p>`;
}

async function loadStats(){
  const stats = await api("/api/mistakes/stats");
  document.getElementById("dueCount").innerText = `${stats.due_count} 題`;
  document.getElementById("masteredCount").innerText = `${stats.mastered_count} 題`;
  document.getElementById("topCategory").innerText = stats.top_error_category;
  const categorySelect = document.getElementById("filterCategory");
  if (categorySelect.options.length <= 1) {
    stats.error_categories.forEach(category => categorySelect.add(new Option(category, category)));
  }
}

document.getElementById("filterType").addEventListener("change", loadMistakes);
document.getElementById("filterCategory").addEventListener("change", loadMistakes);
loadStats().then(loadMistakes);
</script>
</body>
</html>
