<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日文文法結構化拆解</title>
  <style>
    :root { --bg-color:#0d0e15; --text-color:#e8e8e8; --primary:#00ffcc; --secondary:#ff00ff; --panel-bg:#1a1c29; --border-color:#2a2d40; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg-color); color:var(--text-color); font-family:Arial,"Microsoft JhengHei",sans-serif; }
    .shell { width:min(100% - 24px, 960px); margin:24px auto; }
    a { color:var(--primary); text-decoration:none; }
    .nav { display:flex; gap:10px; flex-wrap:wrap; margin:16px 0 24px; }
    .nav a { border:1px solid var(--border-color); padding:10px 12px; border-radius:6px; }
    .card { background:var(--panel-bg); border:1px solid var(--border-color); border-radius:8px; padding:16px; margin-bottom:16px; overflow-wrap:anywhere; word-wrap:break-word; }
    h1,h2,h3,strong,label,summary { color:var(--primary); }
    textarea,button { width:100%; min-height:44px; border-radius:6px; border:1px solid var(--border-color); background:#080910; color:#fff; padding:10px; }
    textarea { min-height:140px; resize:vertical; line-height:1.7; }
    button { color:var(--primary); border-color:var(--primary); background:transparent; font-weight:700; cursor:pointer; }
    .row { display:grid; gap:12px; }
    .muted { color:#aeb4c8; }
    .error { color:var(--secondary); border-left:4px solid var(--secondary); padding-left:10px; }
    details { background:rgba(255,255,255,.06); border-radius:6px; padding:10px; margin-top:10px; }
    .token-grid { display:grid; gap:10px; }
    @media (min-width:760px){ .row.two,.token-grid { grid-template-columns:1fr 1fr; } }
  </style>
</head>
<body>
<main class="shell">
  <h1>日文文法結構化拆解</h1>
  <nav class="nav">
    <a href="/">每日教材</a><a href="/verb-practice">動詞練習</a><a href="/mistake-review">錯題複習</a><a href="/sns-practice">SNS語感</a>
  </nav>

  <section class="card">
    <label for="jpText">輸入日文句子</label>
    <textarea id="jpText" placeholder="例：雨が降っている。"></textarea>
    <div class="row two" style="margin-top:12px;">
      <button id="analyzeBtn">開始拆解</button>
      <button id="copyBtn">複製解析結果</button>
    </div>
    <div id="status" class="muted" style="margin-top:12px;"></div>
  </section>

  <section id="result"></section>
</main>

<script>
let lastResultText = "";
const result = document.getElementById("result");
const statusBox = document.getElementById("status");
function esc(value){ return String(value ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;"); }
async function api(url, options={}) {
  const res = await fetch(url, {headers: {"Content-Type":"application/json"}, ...options});
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || "請求失敗");
  return data;
}
function listCards(items, render, emptyText){
  if (!items || !items.length) return `<p class="muted">${emptyText}</p>`;
  return items.map(render).join("");
}
function renderAnalysis(data){
  lastResultText = JSON.stringify(data, null, 2);
  result.innerHTML = `
    <article class="card"><h2>總覽</h2><p>原文：${esc(data.original)}</p><p>平假名讀音：${esc(data.reading_hiragana)}</p></article>
    <article class="card"><details open><summary>單字拆解</summary><div class="token-grid">
      ${listCards(data.tokens, t => `<div class="card"><strong>${esc(t.surface)}</strong><p>讀音：${esc(t.reading_hiragana)}</p><p>原形：${esc(t.base_form)}</p><p>詞性：${esc(t.pos)} / ${esc(t.pos_detail)}</p><p>活用：${esc(t.conjugation_type)} ${esc(t.conjugation_form)}</p><p>${esc(t.meaning_hint_zh_tw)}</p></div>`, "沒有拆解結果。")}
    </div></details></article>
    <article class="card"><details open><summary>助詞解析</summary>
      ${listCards(data.particles, p => `<div class="card"><strong>${esc(p.surface)}</strong><p>${esc(p.meaning_hint_zh_tw)}</p></div>`, "未偵測到助詞。")}
    </details></article>
    <article class="card"><details open><summary>動詞變化解析</summary>
      ${listCards(data.verb_forms, v => `<div class="card"><strong>${esc(v.surface)}</strong><p>原形：${esc(v.base_form)}</p><p>活用：${esc(v.conjugation_type)} ${esc(v.conjugation_form)}</p></div>`, "未偵測到動詞或助動詞。")}
    </details></article>
    <article class="card"><details open><summary>句型偵測</summary>
      ${listCards(data.grammar_patterns, g => `<div class="card"><strong>${esc(g.pattern)}</strong><p>${esc(g.description_zh_tw)}</p></div>`, "未偵測到指定句型。")}
    </details></article>
    <article class="card"><details open><summary>常見誤解提醒</summary>
      ${listCards(data.common_misunderstandings, m => `<p>${esc(m)}</p>`, "目前沒有特別提醒。")}
      ${listCards(data.notes, n => `<p class="muted">${esc(n)}</p>`, "")}
    </details></article>`;
}
document.getElementById("analyzeBtn").addEventListener("click", async () => {
  const text = document.getElementById("jpText").value.trim();
  if (!text) { statusBox.innerHTML = "<span class='error'>請先輸入日文句子。</span>"; return; }
  statusBox.innerText = "解析中...";
  result.innerHTML = "";
  try {
    const data = await api("/api/analyze_japanese", {method:"POST", body:JSON.stringify({text})});
    if (!data.success) throw new Error(data.error || "解析失敗");
    statusBox.innerText = "解析完成。";
    renderAnalysis(data);
  } catch(error) {
    statusBox.innerHTML = `<span class="error">${esc(error.message)}</span>`;
  }
});
document.getElementById("copyBtn").addEventListener("click", async () => {
  if (!lastResultText) { statusBox.innerHTML = "<span class='error'>尚無解析結果可複製。</span>"; return; }
  await navigator.clipboard.writeText(lastResultText);
  statusBox.innerText = "已複製解析結果。";
});
</script>
</body>
</html>
