<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日語學習自動化系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0d0e15;
      --text-color: #e8e8e8;
      --primary: #00ffcc;
      --secondary: #ff00ff;
      --panel-bg: #1a1c29;
      --border-color: #2a2d40;
    }
    body { background: var(--bg-color); color: var(--text-color); font-family: Arial, "Microsoft JhengHei", sans-serif; padding-bottom: 48px; }
    .app-shell { width: min(100% - 32px, 1320px); margin: 0 auto; }
    .app-title { color: var(--primary); text-shadow: 0 0 12px rgba(0,255,204,.35); font-weight: 800; }
    .card { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 8px; box-shadow: 0 4px 12px rgba(0,0,0,.45); margin-bottom: 20px; }
    .nav-pills .nav-link { color: var(--text-color); background: transparent; border: 0; border-radius: 0; padding: 12px 22px; min-height: 44px; }
    .nav-pills .nav-link.active { color: var(--primary); border-bottom: 2px solid var(--primary); background: rgba(0,255,204,.08); }
    .form-control, .form-select { background: #0b0c13; border: 1px solid var(--border-color); color: var(--text-color); min-height: 44px; }
    .form-control:focus, .form-select:focus { background: #0b0c13; color: var(--text-color); border-color: var(--primary); box-shadow: 0 0 8px rgba(0,255,204,.45); }
    .form-label, .control-label { color: var(--primary); font-weight: 700; }
    .neon-btn { min-height: 44px; background: transparent; color: var(--primary); border: 1px solid var(--primary); border-radius: 5px; padding: 10px 22px; }
    .neon-btn:hover:not(:disabled) { background: var(--primary); color: #000; box-shadow: 0 0 10px var(--primary); }
    .accent-btn { color: var(--secondary); border-color: var(--secondary); }
    .accent-btn:hover:not(:disabled) { background: var(--secondary); color: #000; box-shadow: 0 0 10px var(--secondary); }
    .error-text { color: var(--secondary); font-weight: 700; border: 1px dashed var(--secondary); padding: 15px; border-radius: 5px; }
    .success-text { color: var(--primary); font-weight: 700; }
    .table-scroll { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .table-scroll table { min-width: 1120px; color: var(--text-color); }
    .table thead th { color: var(--primary); border-bottom-color: var(--primary); }
    #grammar-exp { color: #f2f5ff; line-height: 1.75; font-size: 1.04rem; background: rgba(255,255,255,.045); border: 1px solid rgba(0,255,204,.16); border-radius: 6px; padding: 12px 14px; }
    .example-box, .question-box { background: rgba(255,255,255,.09); border: 1px solid rgba(255,255,255,.08); border-left: 4px solid var(--secondary); padding: 12px; margin-bottom: 10px; border-radius: 4px; }
    .example-jp { color: #ffffff; font-weight: 600; }
    .example-cn { color: #e9ecff; font-weight: 600; }
    .range-value { color: var(--secondary); font-weight: 800; min-width: 34px; display: inline-block; text-align: right; }
    .answer-ok { border-left-color: var(--primary) !important; box-shadow: inset 0 0 0 1px rgba(0,255,204,.4); }
    .answer-bad { border-left-color: var(--secondary) !important; box-shadow: inset 0 0 0 1px rgba(255,0,255,.35); }
    .feedback { margin-top: 10px; font-weight: 700; }
    .quiz-title { color: var(--primary); font-size: 1.08rem; font-weight: 800; display: block; margin-bottom: 12px; }
    .quiz-option { color: #f4f7ff; background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.12); cursor: pointer; transition: border-color .15s, background .15s, color .15s; }
    .quiz-option:hover { background: rgba(0,255,204,.12); border-color: rgba(0,255,204,.55); color: #ffffff; }
    .quiz-option input { accent-color: var(--primary); }
    .quiz-option-text { color: #f4f7ff; margin-left: 8px; font-weight: 700; letter-spacing: 0; }
    .quiz-input { color: #ffffff; background: #080910; border-color: rgba(255,0,255,.6); font-weight: 700; }
    .quiz-input::placeholder { color: #9ea3b8; }
    .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 14px; margin-bottom: 20px; }
    .metric-card { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 16px; overflow-wrap: anywhere; word-wrap: break-word; }
    .metric-label { color: #aeb4c8; font-size: .92rem; margin-bottom: 8px; }
    .metric-value { color: var(--primary); font-size: 1.65rem; font-weight: 800; line-height: 1.2; }
    .metric-note { color: #e9ecff; margin-top: 8px; font-size: .95rem; }
    .streak-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-top: 10px; }
    .streak-day { min-height: 42px; border: 1px solid var(--border-color); border-radius: 6px; display: grid; place-items: center; color: #aeb4c8; font-size: .75rem; }
    .streak-day.active { color: #00110d; background: var(--primary); border-color: var(--primary); font-weight: 800; }
    .review-chip { display: block; color: #f4f7ff; border-left: 3px solid var(--secondary); background: rgba(255,255,255,.07); border-radius: 6px; padding: 10px; margin-top: 8px; }
    @media (max-width: 768px) {
      .app-shell { width: min(100% - 20px, 1320px); }
      .app-title { font-size: 1.55rem; }
      .main-nav { display: flex; flex-wrap: nowrap; overflow-x: auto; justify-content: flex-start !important; -webkit-overflow-scrolling: touch; }
      .main-nav .nav-item { flex: 0 0 auto; }
      .main-nav .nav-link { width: max-content; padding: 12px 14px; }
      .settings-actions { display: grid !important; grid-template-columns: 1fr; }
      .settings-actions .neon-btn { width: 100%; }
      .card.p-3, .card.p-4 { padding: 16px !important; }
    }
    @media (min-width: 768px) {
      .dashboard-grid { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>
<div class="app-shell mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
    <h1 class="app-title mb-0">日語學習自動化系統</h1>
    <select id="dateSelect" class="form-select" style="max-width:240px" onchange="loadSpecificDate()">
      <option value="">選擇歷史日期</option>
    </select>
  </div>

  <ul class="main-nav nav nav-pills mb-4 justify-content-center">
    <li class="nav-item"><button class="nav-link active" onclick="showTab(event, 'tab-daily')">每日教材</button></li>
    <li class="nav-item"><button class="nav-link" onclick="startQuiz(event)">累計測驗</button></li>
    <li class="nav-item"><button class="nav-link" onclick="showTab(event, 'tab-settings')">控制中心</button></li>
    <li class="nav-item"><a class="nav-link" href="/verb-practice">動詞練習</a></li>
    <li class="nav-item"><a class="nav-link" href="/mistake-review">錯題複習</a></li>
    <li class="nav-item"><a class="nav-link" href="/grammar-analyzer">文法拆解</a></li>
    <li class="nav-item"><a class="nav-link" href="/sns-practice">SNS語感</a></li>
    <li class="nav-item"><a class="nav-link" href="/learning-report">學習報告</a></li>
  </ul>

  <div id="tab-daily" class="content-tab">
    <section class="dashboard-grid" id="dashboard">
      <div class="metric-card">
        <div class="metric-label">今日教材狀態</div>
        <div class="metric-value" id="dash-material">讀取中</div>
        <div class="metric-note" id="dash-material-note">正在檢查今日教材。</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">測驗完成度</div>
        <div class="metric-value" id="dash-quiz">0 / 0</div>
        <div class="metric-note" id="dash-accuracy">今日答對率：尚無紀錄</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">最近 7 日學習紀錄</div>
        <div class="metric-value" id="dash-streak">0 天</div>
        <div class="streak-row" id="dash-streak-row"></div>
      </div>
      <div class="metric-card">
        <div class="metric-label">今日建議複習</div>
        <div class="metric-value" id="dash-mistakes">0 題</div>
        <div id="dash-review" class="metric-note">目前沒有待複習錯題。</div>
      </div>
    </section>
    <div id="content-loader" class="text-center py-5 text-muted">正在讀取今日學習材料...</div>
    <div id="material-content" style="display:none;">
      <div class="card p-3"><h5 class="fw-bold mb-3" style="color:var(--primary)">單字</h5><div id="vocab-list" class="row g-2"></div></div>
      <div class="card p-3">
        <h5 class="fw-bold mb-3" style="color:var(--primary)">動詞變化表</h5>
        <div class="table-scroll">
          <table class="table text-nowrap">
            <thead><tr><th>辭書形</th><th>連用形</th><th>て形</th><th>た形</th><th>ない形</th><th>ば形</th><th>使役形</th><th>被動形</th><th>使役被動形</th></tr></thead>
            <tbody id="verb-list"></tbody>
          </table>
        </div>
      </div>
      <div class="card p-3"><h5 class="fw-bold" id="grammar-title" style="color:var(--primary)"></h5><p id="grammar-exp"></p><div id="example-list"></div></div>
    </div>
  </div>

  <div id="tab-quiz" class="content-tab" style="display:none;">
    <div class="card p-4">
      <h4 class="mb-4" style="color:var(--primary); border-bottom:1px solid var(--border-color); padding-bottom:15px;">智慧測驗</h4>
      <div id="quiz-container"><div class="text-center text-muted py-4">點擊「累計測驗」後會從已生成教材產生題目。</div></div>
      <button class="neon-btn mt-4 w-100 fw-bold" onclick="checkAnswers()" style="display:none;" id="submit-btn">檢查答案</button>
    </div>
  </div>

  <div id="tab-settings" class="content-tab" style="display:none;">
    <div class="card p-4">
      <h4 class="mb-4" style="color:var(--primary); border-bottom:1px solid var(--border-color); padding-bottom:15px;">控制中心</h4>
      <div class="row g-4">
        <div class="col-md-4">
          <label class="form-label">目標等級</label>
          <select id="setting-level" class="form-select">
            <option>N5</option><option>N4</option><option>N3</option><option>N2</option><option>N1</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="control-label">單字數量 <span class="range-value" id="vocab-value">8</span></label>
          <input type="range" id="setting-vocab" class="form-range" min="1" max="30" value="8" oninput="syncRangeLabels()">
        </div>
        <div class="col-md-4">
          <label class="control-label">動詞數量 <span class="range-value" id="verb-value">4</span></label>
          <input type="range" id="setting-verb" class="form-range" min="0" max="20" value="4" oninput="syncRangeLabels()">
        </div>
        <div class="col-md-6">
          <label class="control-label">選擇題數量 <span class="range-value" id="mcq-value">5</span></label>
          <input type="range" id="setting-mcq" class="form-range" min="0" max="30" value="5" oninput="syncRangeLabels()">
        </div>
        <div class="col-md-6">
          <label class="control-label">填充題數量 <span class="range-value" id="fill-value">5</span></label>
          <input type="range" id="setting-fill" class="form-range" min="0" max="30" value="5" oninput="syncRangeLabels()">
        </div>
      </div>
      <div class="settings-actions d-flex gap-3 mt-4 flex-wrap">
        <button class="neon-btn" onclick="saveSettingsUI()" id="save-btn">保存設定</button>
        <button class="neon-btn accent-btn" onclick="triggerNowUI(false)" id="trigger-btn">立即 AI 生成</button>
        <button class="neon-btn" onclick="triggerNowUI(true)" id="sample-btn">生成範例資料</button>
        <button class="neon-btn" onclick="testTelegram()" id="tg-btn">測試 Telegram</button>
      </div>
      <div id="save-msg" class="mt-3"></div>
    </div>
  </div>
</div>

<script>
  let currentQuiz = [];

  function escapeHtml(value) {
    return String(value ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;");
  }

  async function api(url, options = {}) {
    const res = await fetch(url, { headers: { "Content-Type": "application/json" }, ...options });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "請求失敗，請稍後再試。");
    return data;
  }

  async function apiWithTimeout(url, timeoutMs = 5000) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);
    try {
      const res = await fetch(url, { headers: { "Content-Type": "application/json" }, signal: controller.signal });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "請求失敗，請稍後再試。");
      return data;
    } finally {
      clearTimeout(timer);
    }
  }

  function todayKey() {
    const now = new Date();
    return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}-${String(now.getDate()).padStart(2, "0")}`;
  }

  function getTodayQuizStats() {
    const empty = { completed: 0, total: 0, correct: 0 };
    try {
      return JSON.parse(localStorage.getItem(`quizStats:${todayKey()}`)) || empty;
    } catch {
      return empty;
    }
  }

  function saveTodayQuizStats(correct, total) {
    localStorage.setItem(`quizStats:${todayKey()}`, JSON.stringify({ completed: total, total, correct }));
  }

  function normalizeQuizAnswer(value) {
    return String(value ?? "")
      .trim()
      .replace(/[（(][ぁ-ゖー\s　]+[）)]/g, "")
      .replace(/[\s　\u200b\u200c\u200d\ufeff]+/g, "");
  }

  function currentSettings() {
    return {
      target_level: document.getElementById("setting-level").value,
      vocab_count: document.getElementById("setting-vocab").value,
      verb_count: document.getElementById("setting-verb").value,
      mcq_count: document.getElementById("setting-mcq").value,
      fill_count: document.getElementById("setting-fill").value
    };
  }

  function syncRangeLabels() {
    document.getElementById("vocab-value").innerText = document.getElementById("setting-vocab").value;
    document.getElementById("verb-value").innerText = document.getElementById("setting-verb").value;
    document.getElementById("mcq-value").innerText = document.getElementById("setting-mcq").value;
    document.getElementById("fill-value").innerText = document.getElementById("setting-fill").value;
  }

  window.onload = async () => {
    await loadArchiveList();
    await loadDaily();
    await loadSettings();
    await loadDashboard();
  };

  function showTab(event, id) {
    document.querySelectorAll(".content-tab").forEach(t => t.style.display = "none");
    document.querySelectorAll(".nav-link").forEach(l => l.classList.remove("active"));
    document.getElementById(id).style.display = "block";
    if (event) event.currentTarget.classList.add("active");
  }

  async function loadSettings() {
    const settings = await api("/api/settings");
    document.getElementById("setting-level").value = settings.target_level;
    document.getElementById("setting-vocab").value = settings.vocab_count;
    document.getElementById("setting-verb").value = settings.verb_count;
    document.getElementById("setting-mcq").value = settings.mcq_count;
    document.getElementById("setting-fill").value = settings.fill_count;
    syncRangeLabels();
  }

  async function saveSettingsUI() {
    const btn = document.getElementById("save-btn");
    const msg = document.getElementById("save-msg");
    btn.disabled = true;
    btn.innerText = "保存中...";
    try {
      await api("/api/settings", { method: "POST", body: JSON.stringify(currentSettings()) });
      msg.className = "mt-3 success-text";
      msg.innerText = "設定已經保存。Render Cron 下次會讀取這組參數。";
      await loadDashboard();
    } catch (error) {
      msg.className = "mt-3 error-text";
      msg.innerText = error.message;
    } finally {
      btn.disabled = false;
      btn.innerText = "保存設定";
    }
  }

  async function triggerNowUI(useSample) {
    const btn = useSample ? document.getElementById("sample-btn") : document.getElementById("trigger-btn");
    const msg = document.getElementById("save-msg");
    btn.disabled = true;
    btn.innerText = useSample ? "生成範例中..." : "AI 生成中...";
    msg.className = "mt-3 text-muted";
    msg.innerText = "正在生成教材，並發送 Telegram 通知...";
    try {
      const result = await api(`/api/generate${useSample ? "?sample=1" : ""}`, { method: "POST", body: JSON.stringify(currentSettings()) });
      msg.className = "mt-3 success-text";
      msg.innerText = result.message;
      await loadMaterialByDate(result.date);
      await loadArchiveList();
      await loadDashboard();
    } catch (error) {
      msg.className = "mt-3 error-text";
      msg.innerText = error.message;
    } finally {
      btn.disabled = false;
      btn.innerText = useSample ? "生成範例資料" : "立即 AI 生成";
    }
  }

  async function testTelegram() {
    const btn = document.getElementById("tg-btn");
    const msg = document.getElementById("save-msg");
    btn.disabled = true;
    btn.innerText = "測試中...";
    try {
      const result = await api("/api/test-telegram", { method: "POST" });
      msg.className = "mt-3 success-text";
      msg.innerText = result.message;
    } catch (error) {
      msg.className = "mt-3 error-text";
      msg.innerText = error.message;
    } finally {
      btn.disabled = false;
      btn.innerText = "測試 Telegram";
    }
  }

  async function loadArchiveList() {
    const dates = await api("/api/archive-dates");
    const select = document.getElementById("dateSelect");
    select.innerHTML = '<option value="">選擇歷史日期</option>';
    dates.forEach(date => select.add(new Option(date, date)));
  }

  async function loadDashboard() {
    let data;
    try {
      data = await apiWithTimeout("/api/dashboard", 5000);
    } catch (error) {
      document.getElementById("dash-material").innerText = "整理中";
      document.getElementById("dash-material-note").innerText = "資料整理中，請稍後重新整理";
      document.getElementById("dash-quiz").innerText = "- / -";
      document.getElementById("dash-accuracy").innerText = "資料整理中，請稍後重新整理";
      document.getElementById("dash-streak").innerText = "- 天";
      document.getElementById("dash-streak-row").innerHTML = "";
      document.getElementById("dash-mistakes").innerText = "- 題";
      document.getElementById("dash-review").innerText = "資料整理中，請稍後重新整理";
      return;
    }
    const stats = getTodayQuizStats();
    document.getElementById("dash-material").innerText = data.has_today_material ? "已生成" : "尚未生成";
    document.getElementById("dash-material-note").innerText = data.has_today_material
      ? `${data.today}｜${data.target_level}｜${data.vocab_count} 個單字、${data.verb_count} 個動詞`
      : "今日尚無學習材料，可由控制中心手動生成或等待 Render Cron。";
    document.getElementById("dash-quiz").innerText = `${stats.completed || 0} / ${data.quiz_total || 0}`;
    const accuracy = stats.total ? Math.round((stats.correct / stats.total) * 100) : null;
    document.getElementById("dash-accuracy").innerText = accuracy === null ? "今日答對率：尚無紀錄" : `今日答對率：${accuracy}%`;
    document.getElementById("dash-streak").innerText = `${data.streak_days} 天`;
    document.getElementById("dash-streak-row").innerHTML = data.last_7_days.map(day => {
      const label = day.date.split("/").slice(1).join("/");
      return `<div class="streak-day ${day.studied ? "active" : ""}">${escapeHtml(label)}</div>`;
    }).join("");
    document.getElementById("dash-mistakes").innerText = `${data.due_review_count || 0} 題`;
    document.getElementById("dash-review").innerHTML = (data.due_review_count || 0) > 0
      ? "請前往「錯題複習」頁面完成今日複習。"
      : "目前沒有待複習錯題。";
  }

  async function loadDaily() {
    document.getElementById("content-loader").innerHTML = "正在讀取今日學習材料...";
    document.getElementById("content-loader").style.display = "block";
    document.getElementById("material-content").style.display = "none";
    renderMaterial(await api("/api/materials"));
  }

  async function loadMaterialByDate(date) {
    showTab(null, "tab-daily");
    document.getElementById("content-loader").innerHTML = "正在讀取剛生成的學習材料...";
    document.getElementById("content-loader").style.display = "block";
    document.getElementById("material-content").style.display = "none";
    renderMaterial(await api(`/api/materials?date=${encodeURIComponent(date)}`));
  }

  async function loadSpecificDate() {
    const date = document.getElementById("dateSelect").value;
    if (!date) return;
    renderMaterial(await api(`/api/materials?date=${encodeURIComponent(date)}`));
  }

  function renderMaterial(data) {
    document.getElementById("content-loader").style.display = "none";
    if (!data) {
      document.getElementById("content-loader").innerHTML = "<div class='error-text'>今日尚無學習材料。請到控制中心生成，或等待 Render Cron 自動生成。</div>";
      document.getElementById("content-loader").style.display = "block";
      return;
    }
    document.getElementById("material-content").style.display = "block";
    document.getElementById("vocab-list").innerHTML = data.vocabulary.map(v => `
      <div class="col-12 col-md-6"><div class="p-3 border rounded" style="border-color:var(--border-color)!important;background:rgba(255,255,255,.02);">
        <strong style="color:var(--primary);font-size:1.2em;">${escapeHtml(v.word)}</strong>
        <small style="color:#aaa;margin-left:8px;">${escapeHtml(v.reading)}</small><br>
        <span>${escapeHtml(v.meaning)}</span>
      </div></div>`).join("");
    document.getElementById("verb-list").innerHTML = data.verbs.map(v => `
      <tr><td style="color:var(--secondary);font-weight:bold;">${escapeHtml(v.base || "-")}</td>
      <td>${escapeHtml(v.masuStem || "-")}</td><td>${escapeHtml(v.te || "-")}</td><td>${escapeHtml(v.ta || "-")}</td>
      <td>${escapeHtml(v.nai || "-")}</td><td>${escapeHtml(v.ba || "-")}</td><td>${escapeHtml(v.causative || "-")}</td>
      <td>${escapeHtml(v.passive || "-")}</td><td>${escapeHtml(v.causativePassive || "-")}</td></tr>`).join("");
    document.getElementById("grammar-title").innerText = `${data.targetLevel || ""} ${data.grammar.title || "文法"}`;
    document.getElementById("grammar-exp").innerText = data.grammar.exp || "";
    document.getElementById("example-list").innerHTML = (data.grammar.examples || []).map(ex => `
      <div class="example-box"><span style="color:var(--primary);font-weight:bold;">日文：</span><span class="example-jp">${escapeHtml(ex.jp)}</span><br>
      <span style="color:var(--secondary);font-weight:bold;">中文：</span><span class="example-cn">${escapeHtml(ex.cn)}</span></div>`).join("");
  }

  async function startQuiz(event) {
    showTab(event, "tab-quiz");
    document.getElementById("quiz-container").innerHTML = "<div class='text-center text-muted py-4'>正在產生測驗...</div>";
    document.getElementById("submit-btn").style.display = "none";
    const questions = await api("/api/quiz");
    if (questions.error) {
      document.getElementById("quiz-container").innerHTML = `<div class='error-text'>${escapeHtml(questions.error)}</div>`;
      return;
    }
    currentQuiz = questions;
    document.getElementById("quiz-container").innerHTML = questions.map((q, i) => {
      let html = `<div id="qwrap${i}" class="question-box"><strong class="quiz-title">第 ${i + 1} 題：${escapeHtml(q.q)}</strong>`;
      if (q.type === "MCQ") {
        html += '<div class="mt-3">';
        q.options.forEach(opt => {
          html += `<label class="quiz-option d-block mb-2 p-2 rounded"><input type="radio" name="q${i}" value="${escapeHtml(opt)}"><span class="quiz-option-text">${escapeHtml(opt)}</span></label>`;
        });
        html += "</div>";
      } else {
        html += `<input type="text" id="ans${i}" class="form-control quiz-input mt-3" placeholder="請在這裡輸入答案">`;
      }
      return html + "</div>";
    }).join("");
    document.getElementById("submit-btn").style.display = "block";
  }

  async function checkAnswers() {
    const userAnswers = currentQuiz.map((q, i) => {
      if (q.type === "MCQ") {
        const checked = document.querySelector(`input[name="q${i}"]:checked`);
        return checked ? checked.value : "";
      }
      return document.getElementById(`ans${i}`).value;
    });
    const submitBtn = document.getElementById("submit-btn");
    submitBtn.disabled = true;
    submitBtn.innerText = "批改中...";
    let data;
    try {
      data = await api("/api/quiz/submit", { method: "POST", body: JSON.stringify({ questions: currentQuiz, answers: userAnswers }) });
    } catch (error) {
      document.getElementById("quiz-container").insertAdjacentHTML("beforeend", `<div class='error-text'>${escapeHtml(error.message)}</div>`);
      submitBtn.disabled = false;
      submitBtn.innerText = "檢查答案";
      return;
    }
    currentQuiz.forEach((q, i) => {
      const wrap = document.getElementById(`qwrap${i}`);
      wrap.querySelectorAll(".feedback").forEach(el => el.remove());
      const item = data.results[i] || {};
      const ok = Boolean(item.correct);
      wrap.classList.toggle("answer-ok", ok);
      wrap.classList.toggle("answer-bad", !ok);
      const feedback = document.createElement("div");
      feedback.className = "feedback";
      feedback.style.color = ok ? "var(--primary)" : "var(--secondary)";
      feedback.innerText = ok ? "答對了。" : `答錯了。正確答案：${item.correct_answer || q.displayAns || q.ans}`;
      wrap.appendChild(feedback);
    });
    const result = document.createElement("div");
    result.className = "mt-4 p-4 rounded text-center fw-bold";
    result.style.border = "1px solid var(--primary)";
    result.innerHTML = `測驗完成：<span style="color:var(--primary);font-size:1.5em;">${data.score}</span> / ${data.total}`;
    document.getElementById("quiz-container").appendChild(result);
    submitBtn.style.display = "none";
    submitBtn.disabled = false;
    submitBtn.innerText = "檢查答案";
    saveTodayQuizStats(data.score, data.total);
    loadDashboard();
  }
</script>
</body>
</html>
